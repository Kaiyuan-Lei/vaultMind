name: onchain-alerts
description: "每 2 分鐘抓取 ETH/USDT/WBTC 大額鏈上轉移，AI 自動生成風險摘要，寫入 signals.json"
schedule: "*/2 * * * *"

env:
  ETHERSCAN_API_KEY: "${ETHERSCAN_API_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

steps:
  # ── Step 1a: 抓取 ETH 原生大額轉移 ──────────────────────────
  - name: fetch-eth-txs
    type: http
    url: https://api.etherscan.io/api
    params:
      module: account
      action: txlist
      address: "0x0000000000000000000000000000000000000000"
      sort: desc
      apikey: "${ETHERSCAN_API_KEY}"
    on_error: continue
    output: raw_eth_txs

  # ── Step 1b: 抓取 USDT ERC-20 大額轉移 ──────────────────────
  - name: fetch-usdt-txs
    type: http
    url: https://api.etherscan.io/api
    params:
      module: account
      action: tokentx
      # Bug 2 fix: USDT 合約地址
      contractaddress: "0xdac17f958d2ee523a2206206994597c13d831ec7"
      sort: desc
      apikey: "${ETHERSCAN_API_KEY}"
    on_error: continue
    output: raw_usdt_txs

  # ── Step 1c: 抓取 WBTC ERC-20 大額轉移 ──────────────────────
  - name: fetch-wbtc-txs
    type: http
    url: https://api.etherscan.io/api
    params:
      module: account
      action: tokentx
      # Bug 2 fix: WBTC 合約地址
      contractaddress: "0x2260fac5e5542a773aa44fbcfedf7c193bc2c599"
      sort: desc
      apikey: "${ETHERSCAN_API_KEY}"
    on_error: continue
    output: raw_wbtc_txs

  # ── Step 2: 過濾、標準化、合并三個資產的大額交易 ────────────
  - name: filter-and-merge
    type: transform
    input: [raw_eth_txs, raw_usdt_txs, raw_wbtc_txs]
    output: filtered_txs
    script: |
      const ETH_PRICE  = 2608;
      const WBTC_PRICE = 68967;
      const THRESHOLD  = 500000;

      // ETH 原生交易（value 單位：wei = 1e-18 ETH）
      const ethTxs = (raw_eth_txs?.result || [])
        .filter(tx => tx.isError === '0')
        .map(tx => ({
          asset:      'ETH',
          amount_usd: parseFloat(tx.value) / 1e18 * ETH_PRICE,
          direction:  'transfer',
          from:       tx.from,
          to:         tx.to,
          hash:       tx.hash,
          time:       new Date(parseInt(tx.timeStamp) * 1000).toISOString(),
        }))
        // Bug 1 fix: >= 而非 >，不遺漏精確 $500K 的交易
        .filter(tx => tx.amount_usd >= THRESHOLD);

      // USDT ERC-20 轉移（value 單位：micro-USDT = 1e-6 USDT）
      const usdtTxs = (raw_usdt_txs?.result || [])
        .map(tx => ({
          asset:      'USDT',
          amount_usd: parseFloat(tx.value) / 1e6,
          direction:  'transfer',
          from:       tx.from,
          to:         tx.to,
          hash:       tx.hash,
          time:       new Date(parseInt(tx.timeStamp) * 1000).toISOString(),
        }))
        .filter(tx => tx.amount_usd >= THRESHOLD);

      // WBTC ERC-20 轉移（value 單位：satoshi = 1e-8 WBTC）
      const wbtcTxs = (raw_wbtc_txs?.result || [])
        .map(tx => ({
          asset:      'WBTC',
          amount_usd: parseFloat(tx.value) / 1e8 * WBTC_PRICE,
          direction:  'transfer',
          from:       tx.from,
          to:         tx.to,
          hash:       tx.hash,
          time:       new Date(parseInt(tx.timeStamp) * 1000).toISOString(),
        }))
        .filter(tx => tx.amount_usd >= THRESHOLD);

      // 合并、按金額降序、取前 10
      return [...ethTxs, ...usdtTxs, ...wbtcTxs]
        .sort((a, b) => b.amount_usd - a.amount_usd)
        .slice(0, 10);

  # ── Step 3: AI 分析（Bug 3+4 fix：加 input/api_key/system_prompt）──
  - name: claude-analysis
    type: claude
    # Bug 4 fix: 聲明依賴，確保在 filter-and-merge 完成後執行
    input: [filtered_txs]
    api_key: "${ANTHROPIC_API_KEY}"
    model: claude-sonnet-4-20250514
    max_tokens: 400
    # Warn 6 fix: 加入角色設定
    system_prompt: |
      你是一位專業的 Web3 鏈上數據分析師，專注於識別大額轉移的風險信號。
      回答使用繁體中文，精簡扼要，每條建議不超過 30 字。
    prompt: |
      以下是過去 2 分鐘內的大額鏈上轉移（門檻 $500K USD）：

      {{filtered_txs}}

      請：
      1. 識別最值得關注的 1-2 筆交易（說明異常原因）
      2. 給出 3 條具體操作建議（每條 ≤30 字）
      3. 整體風險評級：低 / 中 / 高
    output: ai_summary

  # ── Step 4: 合并並寫入 signals.json（Design 7 fix：與 index.html 對齊）──
  - name: write-signals
    type: transform
    input: [filtered_txs, ai_summary]
    script: |
      // 標準化為 signals.json 的 alerts 結構（與 index.html 和 signals.json 匹配）
      const alerts = (filtered_txs || []).map((tx, i) => ({
        id:         `alert-${String(i+1).padStart(3,'0')}`,
        time:       new Date(tx.time).toLocaleTimeString('zh-HK', { hour:'2-digit', minute:'2-digit' }),
        asset:      tx.asset,
        amount_usd: Math.round(tx.amount_usd),
        direction:  tx.direction,
        risk:       tx.amount_usd > 2000000 ? 'high' : tx.amount_usd > 1000000 ? 'medium' : 'low',
        detail:     `${tx.from.slice(0,6)}...${tx.from.slice(-4)} → ${tx.to.slice(0,6)}...${tx.to.slice(-4)}`,
        tx_hash:    tx.hash,
      }));

      return {
        timestamp:             new Date().toISOString(),
        summary: {
          protocols_monitored: 28,
          chains:              ['ETH'],
          large_tx_alerts_24h: alerts.length,
          anomalous_tx_count:  alerts.filter(a => a.risk === 'high').length,
          data_lag_seconds:    2.3,
        },
        alerts,
        ai_insights: ai_summary || null,
      };
    # Design 7 fix: 寫入 signals.json，與 index.html 的讀取路徑一致
    save: ./data/signals.json
